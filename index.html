<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>WatchFilms</title>
</head>
<body>
  <script type="module">
    import { supabase } from './js/supabase.js'

    const { data } = await supabase.auth.getSession()

    if (data.session) {
      window.location.href = './pages/home.html'
    } else {
      window.location.href = './pages/login.html'
    }
  </script>
</body>
</html>
