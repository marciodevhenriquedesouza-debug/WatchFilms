<!doctype html>
<html lang="p-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loginWatchFilms</title>
    <link rel="stylesheet" href="/css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section class="container">
      <img src="/assets/img/fundoContainer.jpg" alt="" />
      <header>
        <div class="logo">
          <span class="logoW">Watch</span><span class="logoF">Films</span>
        </div>
        <div class="logoHead">
          <span>O que vamos assistir hoje ??</span>
        </div>
      </header>
      <div class="bunner">
        <div class="face frente">Planos a partir de R$ 9,90 mês</div>
        <div class="face verso">Não perca mais tempo, junte-se a nós</div>
      </div>
           

      <div class="login">
        
         
          <div id="tela-email">
          <span>Pegue sua pipoca e venha se divertir com <br/> os melhores filmes e séries.</span> 
          <input id="inputEmail" class="senha" placeholder="Digite seu email"type="email"/>
          <button id="btnVamosLa">Vamos lá >></button>
          
        </div>

        <div id="tela-login" style="display:none">
          <span>Pegue sua pipoca e venha se divertir com <br/> os melhores filmes e séries.</span> 
          <input id="inputSenha"placeholder="Digite sua senha   🔒"type="password"/>
          <button id="btnEntrar">Entrar</button>
          <a href="" class="esqueceu-senha" id="linkEsqueceu">Esqueceu sua senha , clique aqui</a>
        </div>

        <div id="tela-cadastro" style="display:none">
          <span>Crie sua Conta</span>
          <input id="inputNome" placeholder="Digite seu Nome     👤"type="text"/>
          <input id="inputSenhaNova" placeholder="Crie uma Senha      🔒"type="password"/>
          <input id="inputConfirma" placeholder="Confirme a Senha   🔒"type="password"/>
          <button id="btnCriaConta">Criar conta</button>
        </div> 

      </div>
    </section>
  </body>
  <script type="module" src="/js/auth.js"></script>
</html>
